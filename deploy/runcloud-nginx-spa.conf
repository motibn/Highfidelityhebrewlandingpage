# RunCloud — ניתוב SPA ל־/thank-you ולשאר הראוטים של React
# ==============================================================
# בלי זה, כניסה ישירה או רענון ב־/thank-you עלולים להחזיר 404.
#
# איפה: Web Application → הדומיין שלכם → NGINX Config
#   (או "Custom Nginx configuration" / Additional directives)
#
# אם כבר קיים `location / { ... }` — הוסיפו רק את שורת try_files
# או מזגו בזהירות (אל תכפלו בלוק שלם פעמיים).
#
# --- מצב Nginx לבד (סטטי) ---
location / {
    try_files $uri $uri/ /index.html;
}
#
# --- מצב Hybrid (Nginx + Apache) ב־RunCloud ---
# לרוב Apache + קובץ .htaccess ב־public כבר מספיקים.
# אם עדיין 404: לעיתים Nginx מטפל בבקשה לפני Apache — אז חובה לשלב
# try_files ב־Nginx (כמו למעלה) או את הנחיות ה־proxy ש־RunCloud מספקים
# לווריאנט Hybrid שלכם. אם אינכם בטוחים, פתחו פנייה לתמיכת RunCloud
# עם "SPA fallback for React" + שם ה־Web App.
#
# --- אופציונלי: /thank-you בלי slash → 301 ל־/thank-you/ (אם יש תיקיית thank-you/index.html)
# location = /thank-you {
#     return 301 /thank-you/;
# }
