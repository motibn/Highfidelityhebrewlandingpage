# RunCloud + Nginx — SPA (Vite/React Router)
# ------------------------------------------
# בלי השורות הבאות, כל כניסה ישירה ל־/thank-you או רענון בדף פנימי מחזירה 404.
#
# איפה להדביק ב־RunCloud (תלוי בגרסה/ממשק):
# Web Application → האתר שלכם → Nginx / Custom Config / "Additional Nginx directives"
# או עריכת קובץ הקונפיג של ה־vhost — בתוך בלוק server { ... }
#
# אם כבר קיים לכם `location / { ... }`, הוסיפו רק את השורה try_files הפנימית
# (אל תשכפלו blocק שלם פעמיים).

location / {
    try_files $uri $uri/ /index.html;
}
